name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # required to push images to GHCR

jobs:

  # ============================================================
  # JOB 1 — Compile all modules and produce JARs
  # Runs first; all downstream jobs depend on it.
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Compile and package all modules
        run: ./mvnw package -DskipTests -B

      - name: Upload JARs for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: '**/target/*.jar'
          retention-days: 1

  # ============================================================
  # JOB 2 — Run tests for each service in parallel
  # Uses PostgreSQL + Kafka service containers so tests have
  # real infrastructure without needing docker-compose.
  # Config-server is bypassed via env vars (SPRING_CLOUD_CONFIG_ENABLED=false)
  # so each service gets its required properties from the runner environment.
  # ============================================================
  test:
    name: Test / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false  # one failure doesn't cancel the other services
      matrix:
        service:
          - config-server
          - eureka-server
          - api-gateway
          - auth-service
          - project-service
          - workitem-service
          - sprint-service
          - notification-service

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: bitnami/kafka:3.6
        ports:
          - 9092:9092
        env:
          KAFKA_CFG_NODE_ID: 0
          KAFKA_CFG_PROCESS_ROLES: controller,broker
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@127.0.0.1:9093
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
        options: >-
          --health-cmd "kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw test -pl ${{ matrix.service }} -B
        env:
          # Bypass config-server — inject all required properties directly
          SPRING_CLOUD_CONFIG_ENABLED: "false"
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: admin
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: "86400000"
          EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
          EUREKA_CLIENT_FETCH_REGISTRY: "false"

  # ============================================================
  # JOB 3 — Build and push Docker image for each service in parallel
  # Only runs on pushes to main (not on PRs) to save CI minutes.
  # Downloads the JARs produced by the build job — the Dockerfiles
  # use COPY target/*.jar so the JAR must already exist.
  # Images are pushed to GHCR: ghcr.io/<owner>/<service>
  # Two tags per image: the commit SHA (immutable) and latest.
  # ============================================================
  docker-build:
    name: Docker / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - eureka-server
          - api-gateway
          - auth-service
          - project-service
          - workitem-service
          - sprint-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: service-jars

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
