name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # required to push images to GHCR

jobs:

  # ============================================================
  # JOB 1 — Compile all modules and produce JARs
  # Runs first; all downstream jobs depend on it.
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Compile and package all modules
        run: ./mvnw package -DskipTests -B

      - name: Upload JARs for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: '**/target/*.jar'
          retention-days: 1

  # ============================================================
  # JOB 2 — Run tests for each service in parallel
  # Uses PostgreSQL + Kafka service containers so tests have
  # real infrastructure without needing docker-compose.
  # Config-server is bypassed via env vars (SPRING_CLOUD_CONFIG_ENABLED=false)
  # so each service gets its required properties from the runner environment.
  # ============================================================
  test:
    name: Test / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false  # one failure doesn't cancel the other services
      matrix:
        service:
          - config-server
          - eureka-server
          - api-gateway
          - auth-service
          - project-service
          - workitem-service
          - sprint-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw test -pl ${{ matrix.service }} -B

  # ============================================================
  # JOB 3 — Build and push Docker image for each service in parallel
  # Only runs on pushes to main (not on PRs) to save CI minutes.
  # Downloads the JARs produced by the build job — the Dockerfiles
  # use COPY target/*.jar so the JAR must already exist.
  # Images are pushed to GHCR: ghcr.io/<owner>/<service>
  # Two tags per image: the commit SHA (immutable) and latest.
  # ============================================================
  docker-build:
    name: Docker / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - eureka-server
          - api-gateway
          - auth-service
          - project-service
          - workitem-service
          - sprint-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: service-jars

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
