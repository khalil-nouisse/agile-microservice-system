spring.application.name=api-gateway
server.port=8080

# gateway actuator endpoint — kept local as it's infrastructure-only, not business config
management.endpoint.gateway.enabled=true

# All other config (jwt.secret, discovery locator, Eureka URL) comes from config-server.
# Uses http://localhost:8888 by default; override with SPRING_CLOUD_CONFIG_URI in Docker.
spring.config.import=optional:configserver:
