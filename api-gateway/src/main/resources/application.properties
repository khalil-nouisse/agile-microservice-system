spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=project-service
spring.cloud.gateway.routes[1].uri=lb://project-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/projects/**

spring.cloud.gateway.routes[2].id=workitem-service
spring.cloud.gateway.routes[2].uri=lb://workitem-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/workitems/**

spring.cloud.gateway.routes[3].id=sprint-service
spring.cloud.gateway.routes[3].uri=lb://sprint-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/sprints/**

spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://notification-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**

